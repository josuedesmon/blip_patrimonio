<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blip Patrimônio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
    color:#111827;
}

.container{max-width:1000px;margin:auto;}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
}

h1{font-size:28px;}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{opacity:.9;}

.btn-editar{
    margin-top:12px;
    background:#111827;
    width:100%;
}

.close{background:#dc2626;}

.search{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:14px;
    font-size:15px;
}

.contador{
    margin-bottom:12px;
    font-weight:bold;
    color:#555;
}

.status{
    margin-bottom:15px;
    color:#15803d;
    font-weight:bold;
}

.cards{
    display:grid;
    gap:12px;
}

.card{
    background:white;
    padding:16px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card.disponivel{border-left:6px solid #22c55e;}
.card.indisponivel{border-left:6px solid #ef4444;}

.card h3{
    margin-bottom:8px;
    font-size:20px;
}

.card p{margin:6px 0;}

.tag{
    display:inline-block;
    background:#e5e7eb;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
    margin-top:8px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:999;
}

.modal-content{
    background:white;
    width:100%;
    max-width:500px;
    border-radius:12px;
    padding:20px;
    max-height:90vh;
    overflow:auto;
}

.modal-title{margin-bottom:12px;}

label{
    display:block;
    margin-bottom:5px;
    margin-top:10px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin-bottom:8px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

textarea{
    min-height:90px;
    resize:vertical;
}

.botoes-modal{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.botoes-modal button{flex:1;}

.vazio{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    color:#6b7280;
}

@media(max-width:600px){
    body{padding:14px;}
    .header{flex-direction:column;align-items:stretch;}
    h1{font-size:24px;}
    .header button{width:100%;}
    .botoes-modal{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📦 Blip Patrimônio</h1>
        <button onclick="novoEquipamento()">+ Novo Equipamento</button>
    </div>

    <input
        class="search"
        placeholder="🔍 Pesquisar patrimônio, equipamento, categoria ou localização..."
        oninput="filtrar(this.value)"
    >

    <div class="contador" id="contador">Total de Equipamentos: 0</div>
    <div class="status" id="status"></div>
    <div class="cards" id="lista"></div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">

        <h2 class="modal-title" id="tituloModal">Novo Equipamento</h2>

        <label>Patrimônio</label>
        <input id="patrimonio" placeholder="CAM-001">

        <label>Equipamento</label>
        <input id="equipamento" placeholder="Sony FX3">

        <label>Categoria</label>
        <select id="categoria">
            <option>Carregando...</option>
        </select>

        <label>Localização</label>
        <input id="localizacao" placeholder="CASE-FX3">

        <label>Disponível para Locação?</label>
        <select id="disponivel">
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <label>Observação</label>
        <textarea id="observacao" placeholder="Observações..."></textarea>

        <div class="botoes-modal">
            <button id="btnSalvar" onclick="salvar()">Salvar</button>
            <button class="close" onclick="fecharModal()">Fechar</button>
        </div>

    </div>
</div>

<script>
const API =
"https://script.google.com/macros/s/AKfycbzJARCNAb_Gbk3zC27xsxvmwKz6Uebo43bHCvv5uIVFFEUafLmiaHgd8ZZJhGn64cXT/exec";

let equipamentos = [];
let editandoId = null;

async function carregarCategorias(){
    try{
        const response = await fetch(API + "?action=categorias");
        const categorias = await response.json();
        const select = document.getElementById("categoria");

        select.innerHTML = "";

        categorias.forEach(cat => {
            if(!cat) return;

            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;

            select.appendChild(option);
        });
    }catch(error){
        console.error("Erro ao carregar categorias:", error);
        document.getElementById("categoria").innerHTML =
            '<option value="">Erro ao carregar categorias</option>';
    }
}

async function carregarEquipamentos(){
    try{
        const response = await fetch(API);
        const data = await response.json();

        equipamentos = data.slice(1).reverse();

        atualizarContador();
        renderizar(equipamentos);
    }catch(error){
        console.error("Erro ao carregar equipamentos:", error);
        document.getElementById("lista").innerHTML =
            '<div class="vazio">Erro ao carregar equipamentos.</div>';
    }
}

function atualizarContador(){
    document.getElementById("contador").innerText =
        "Total de Equipamentos: " + equipamentos.length;
}

function renderizar(lista){
    const container = document.getElementById("lista");
    container.innerHTML = "";

    if(lista.length === 0){
        container.innerHTML =
            '<div class="vazio">Nenhum equipamento encontrado.</div>';
        return;
    }

    lista.forEach(item => {
        const id = item[0] || "";
        const patrimonio = item[1] || "";
        const equipamento = item[2] || "";
        const categoria = item[3] || "";
        const localizacao = item[4] || "";
        const disponivel = item[5] || "";
        const observacao = item[6] || "";
        const classe = disponivel === "Sim" ? "disponivel" : "indisponivel";

        container.innerHTML += `
            <div class="card ${classe}">
                <h3>${patrimonio}</h3>

                <p><strong>Equipamento:</strong> ${equipamento}</p>
                <p>📁 <strong>Categoria:</strong> ${categoria}</p>
                <p>📍 <strong>Localização:</strong> ${localizacao}</p>
                <p>🎯 <strong>Disponível para Locação:</strong> ${disponivel}</p>

                ${observacao ? `<p>📝 <strong>Obs:</strong> ${observacao}</p>` : ""}

                <div class="tag">ID ${id}</div>

                <button class="btn-editar" onclick="editar('${id}')">
                    ✏️ Editar
                </button>
            </div>
        `;
    });
}

function filtrar(texto){
    texto = texto.toLowerCase();

    const filtrado = equipamentos.filter(item =>
        JSON.stringify(item).toLowerCase().includes(texto)
    );

    renderizar(filtrado);
}

function abrirModal(){
    document.getElementById("modal").style.display = "flex";
}

function fecharModal(){
    document.getElementById("modal").style.display = "none";
    limparFormulario();
    editandoId = null;
}

function novoEquipamento(){
    editandoId = null;

    document.getElementById("tituloModal").innerText = "Novo Equipamento";
    document.getElementById("btnSalvar").innerText = "Salvar";

    limparFormulario();
    abrirModal();
}

function limparFormulario(){
    document.getElementById("patrimonio").value = "";
    document.getElementById("equipamento").value = "";
    document.getElementById("localizacao").value = "";
    document.getElementById("disponivel").value = "Sim";
    document.getElementById("observacao").value = "";
}

function editar(id){
    const item = equipamentos.find(e => String(e[0]) === String(id));

    if(!item){
        alert("Equipamento não encontrado.");
        return;
    }

    editandoId = id;

    document.getElementById("tituloModal").innerText = "Editar Equipamento";
    document.getElementById("btnSalvar").innerText = "Salvar Alterações";

    document.getElementById("patrimonio").value = item[1] || "";
    document.getElementById("equipamento").value = item[2] || "";
    document.getElementById("categoria").value = item[3] || "";
    document.getElementById("localizacao").value = item[4] || "";
    document.getElementById("disponivel").value = item[5] || "Sim";
    document.getElementById("observacao").value = item[6] || "";

    abrirModal();
}

async function salvar(){
    const patrimonio = document.getElementById("patrimonio").value.trim();
    const equipamento = document.getElementById("equipamento").value.trim();

    if(!patrimonio || !equipamento){
        alert("Preencha pelo menos o patrimônio e o equipamento.");
        return;
    }

    const payload = {
        patrimonio: patrimonio,
        equipamento: equipamento,
        categoria: document.getElementById("categoria").value,
        localizacao: document.getElementById("localizacao").value.trim(),
        disponivelLocacao: document.getElementById("disponivel").value,
        observacao: document.getElementById("observacao").value.trim()
    };

    if(editandoId){
        payload.action = "update";
        payload.id = editandoId;
    }

    const btnSalvar = document.getElementById("btnSalvar");
    btnSalvar.disabled = true;
    btnSalvar.innerText = "Salvando...";

    try{
        await fetch(API,{
            method:"POST",
            body:JSON.stringify(payload)
        });

        document.getElementById("status").innerText =
            editandoId
            ? "✅ Equipamento atualizado com sucesso."
            : "✅ Equipamento cadastrado com sucesso.";

        fecharModal();

        await carregarEquipamentos();

        setTimeout(() => {
            document.getElementById("status").innerText = "";
        }, 3000);
    }catch(error){
        console.error("Erro ao salvar:", error);
        alert("Erro ao salvar. Veja o console para detalhes.");
    }finally{
        btnSalvar.disabled = false;
        btnSalvar.innerText = editandoId ? "Salvar Alterações" : "Salvar";
    }
}

carregarCategorias();
carregarEquipamentos();
</script>

</body>
</html>
